</head>

<body class="pagina-principal">

                <span></span><span></span><span></span>

    <div class="mobile-overlay" id="mobileMenu">
        <div class="mobile-nav-content">
            <a href="nuestra-historia.html" class="mobile-link">Nuestra Historia</a>
            <a href="la-boda.html" class="mobile-link">La Boda</a>
            <a href="direccion.html" class="mobile-link">Dirección</a>
            <a href="alojamientos.html" class="mobile-link">Alojamientos</a>
            <a href="regalos.html" class="mobile-link">Regalos</a>
            <a href="contacto.html" class="mobile-link">Contacto</a>
            <a href="#" class="mobile-link">Asistencia</a>
        </div>
    </div>

    <header class="hero">
        <div class="capa motivos"></div>
        <div class="capa foco-luz"></div>
        <div class="escenario">
            <div class="bloque-nombres-sellado">
                <h1 class="nombre andrea">Andrea</h1>
                <span class="ampersand">&</span>
                <h1 class="nombre nacho">Nacho</h1>
            </div>
            <div class="bloque-fecha">
                <p class="fecha-texto">05 . DICIEMBRE . 2026</p>
            </div>
        </div>
    </header>

    <div id="seccion-asistencia-overlay" class="asistencia-full-page">
        <button class="cerrar-asistencia" onclick="cerrarAsistencia()">&times;</button>
        
        <div class="contenedor-formulario-centrado">
            <div class="contenedor-camino">
                <div class="titulo-historia">
                    <h1 class="nombre-script">Asistencia</h1>
                    <p class="subtitulo-etiqueta">Ayúdanos a organizar los invitados</p>
                </div>

                <form action="https://docs.google.com/forms/d/e/1FAIpQLSd9njxF7JqC1Iv31iT0pjI1ti4DAZNm0GTBwpf4nlHtOXzxRA/formResponse" method="POST" id="form-boda" target="hidden_iframe" class="formulario-boda">
                    
                    <div class="grupo-input-nombre">
                        <label>Nombre y Apellidos</label>
                        <input type="text" name="entry.1691230691" placeholder="Tu nombre completo..." required>
                    </div>

                    <div class="grupo-input-asistencia">
                        <label class="titulo">¿Podrás acompañarnos?</label> 
                        <div class="opciones-radio">
                            <label><input type="radio" name="entry.1018698544" value="¡Sí, allí estaré!" onclick="gestionarAsistencia(true)" required> ¡Sí!</label>
                            <label><input type="radio" name="entry.1018698544" value="Lo siento, no puedo" onclick="gestionarAsistencia(false)"> No puedo</label>
                        </div>
                    </div>

                    <div id="bloque-confirmado" style="display:none;">
                        
                        <div class="grupo-input-nombre">
                            <label>Tus Alergias o Intolerancias</label>
                            <input type="text" name="entry.1352496739" placeholder="Ninguna, celíaco, etc...">
                        </div>
                        
                        <div class="grupo-input-asistencia">
                            <label class="titulo">¿Vienes acompañado/a?</label>
                            <div class="opciones-radio">
                                <label><input type="radio" name="entry.1989433917" value="Sí" onclick="verAcompanante(true)"> Sí</label>
                                <label><input type="radio" name="entry.1989433917" value="No" onclick="verAcompanante(false)" checked> No</label>
                            </div>
                        </div>

                        <div id="seccion-acomp" style="display:none; border-left: 1px solid rgba(139,0,0,0.2); padding-left: 20px; margin-top: 10px;">
                            <div class="grupo-input-nombre">
                                <label>Nombre del Acompañante</label>
                                <input type="text" name="entry.1065876426" placeholder="Nombre completo...">
                            </div>
                            <div class="grupo-input-nombre">
                                <label>Alergias del Acompañante</label>
                                <input type="text" name="entry.1219213508" placeholder="Dieta especial...">
                            </div>
                        </div>

                        <div class="grupo-input-asistencia" style="margin-top: 20px;">
                            <label class="titulo">¿Vienes con niños?</label>
                            <div class="opciones-radio">
                                <label><input type="radio" name="entry.1491740924" value="Sí" onclick="verNinos(true)"> Sí</label>
                                <label><input type="radio" name="entry.1491740924" value="No" onclick="verNinos(false)" checked> No</label>
                            </div>
                        </div>

                        <div id="seccion-ninos" style="display:none; border-left: 1px solid rgba(139,0,0,0.2); padding-left: 20px; margin-top: 10px;">
                            <div class="grupo-input-nombre">
                                <label>Nombres y edades</label>
                                <input type="text" name="entry.1458899732" placeholder="Ej: Lucas (5), Sofía (8)...">
                            </div>
                            <div class="grupo-input-nombre">
                                <label>Alergias o Menú Niños</label>
                                <input type="text" name="entry.2096621067" placeholder="Alergias de los peques...">
                            </div>
                        </div>
                    </div> 

                    <button type="submit" class="btn-confirmar-grande">Confirmar Asistencia</button>
                </form> 
            </div> 
        </div> 
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {gracias();}"></iframe>

    <script>
        var submitted = false;
        document.getElementById('form-boda').onsubmit = function() { submitted = true; };

        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');

        const toggleMenu = () => {
            menuToggle.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : 'auto';
        };
        menuToggle.addEventListener('click', toggleMenu);

        function abrirAsistencia() {
            document.getElementById('seccion-asistencia-overlay').classList.add('active');
            if(mobileMenu.classList.contains('active')) toggleMenu();
            document.body.style.overflow = 'hidden';
        }
        function cerrarAsistencia() {
            document.getElementById('seccion-asistencia-overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.querySelectorAll('.btn-asistencia, .mobile-link, .nav-link').forEach(boton => {
            if(boton.textContent.trim().toLowerCase().includes('asistencia')) {
                boton.addEventListener('click', (e) => {
                    e.preventDefault();
                    abrirAsistencia();
                });
            }
        });

        function gestionarAsistencia(asiste) { document.getElementById('bloque-confirmado').style.display = asiste ? 'block' : 'none'; }
        function verAcompanante(mostrar) { document.getElementById('seccion-acomp').style.display = mostrar ? 'block' : 'none'; }
        function verNinos(mostrar) { document.getElementById('seccion-ninos').style.display = mostrar ? 'block' : 'none'; }
        
        function gracias() { 
            alert("¡Muchas gracias! Confirmación recibida."); 
            cerrarAsistencia(); 
            // Reiniciar estado para futuros envíos
            submitted = false;
            document.getElementById('form-boda').reset();
            document.getElementById('bloque-confirmado').style.display = 'none';
        }
    </script>
</body>
</html>
