    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>

<body class="pagina-interna"> <div id="seccion-asistencia-overlay" class="asistencia-full-page">
        <button class="cerrar-asistencia" onclick="cerrarAsistencia()">&times;</button>
        
        <div class="contenedor-formulario-centrado">
            <div class="contenedor-camino">
                <div class="titulo-historia">
                    <h1 class="nombre-script">Asistencia</h1>
                </div>
                
                <div class="grupo-input-asistencia">
                    <p style="font-family: 'Playfair Display'; text-align: center; color: #5d6d7e; letter-spacing: 2px; margin-top: 20px;">
                        PRÓXIMAMENTE EL FORMULARIO
                    </p>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </button>

            <div class="desktop-menu menu-left">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="nuestra-historia.html" class="nav-link">Nuestra Historia</a>
                <a href="la-boda.html" class="nav-link">La Boda</a>
            </div>

            <div class="asistencia-centro">
                <a href="#" class="btn-asistencia">Asistencia</a>
            </div>

            <div class="desktop-menu menu-right">
                <a href="alojamientos.html" class="nav-link">Alojamiento</a>
                <a href="regalos.html" class="nav-link">Regalos</a>
                <a href="contacto.html" class="nav-link">Contacto</a>
            </div>

            <a href="index.html" class="mobile-home-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8B0000" stroke-width="1.2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
        </div>
    </nav>

    <header class="header-historia">
        <div class="titulo-historia">
            <h1 class="nombre-script">Nuestra Historia</h1>
        </div>
    </header>

    <main class="contenedor-camino">
        <div class="camino-botanico">
            
            <div class="punto-historia">
                <div class="texto-historia">
                    <span class="año-script">2019</span>
                    <p class="hito-texto">El Comienzo</p>
                </div>
                <div class="foto-ovalada">
                    <img src="img/Foto2019.png" alt="2019" loading="lazy">
                </div>
            </div>

            <div class="punto-historia">
                <div class="texto-historia">
                    <span class="año-script">2026</span>
                    <p class="hito-texto">Objetivos</p>
                </div>
                <div class="foto-ovalada">
                    <img src="img/Foto2026.png" alt="2026" loading="lazy">
                </div>
            </div>

        </div>
    </main>

    <div class="mobile-overlay" id="mobileMenu">
        <div class="mobile-nav-content">
            <a href="index.html" class="mobile-link">Inicio</a>
            <a href="la-boda.html" class="mobile-link">La Boda</a>
            <a href="direccion.html" class="mobile-link">Dirección</a>
            <a href="alojamientos.html" class="mobile-link">Alojamiento</a>
            <a href="regalos.html" class="mobile-link">Regalos</a>
            <a href="contacto.html" class="mobile-link">Contacto</a>
            <a href="#" class="mobile-link">Asistencia</a>
        </div>
    </div>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const mobileOverlay = document.querySelector('.mobile-overlay');
        const asistenciaOverlay = document.getElementById('seccion-asistencia-overlay');

        // Hamburguesa
        menuToggle.addEventListener('click', () => {
            mobileOverlay.classList.toggle('active');
            menuToggle.classList.toggle('open');
        });

        // Asistencia
        function abrirAsistencia() {
            asistenciaOverlay.classList.add('active');
            mobileOverlay.classList.remove('active');
            menuToggle.classList.remove('open');
            document.body.style.overflow = 'hidden'; // Bloquea scroll
        }

        function cerrarAsistencia() {
            asistenciaOverlay.classList.remove('active');
            document.body.style.overflow = 'auto'; // Devuelve scroll
        }

        // Listener para todos los botones de Asistencia
        document.querySelectorAll('.btn-asistencia, .mobile-link').forEach(boton => {
            if(boton.textContent.trim().toLowerCase().includes('asistencia')) {
                boton.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    abrirAsistencia();
                });
            }
        });
    </script>
</body>
